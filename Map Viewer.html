<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Choo Choo Chooser — Map Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Hanken+Grotesque:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{
  --paper:#F3ECDC; --surface:#FBF6EC; --surface-2:#EFE6D3; --surface-3:#E7DCC4;
  --ink:#21271F; --ink-soft:#5C6253; --ink-faint:#8A8B79;
  --line:#DCCFB4; --line-soft:#E7DDC8;
  --pine:#1E4A37; --pine-deep:#143226; --rust:#BB5430; --rust-soft:#D98B5E;
  --alpine:#2E6E8E; --gold:#C99227; --snow:#FFFFFF;
  --accent:var(--pine); --accent-ink:#FBF6EC;
  --shadow: 0 1px 2px rgba(40,30,10,.05), 0 8px 24px -12px rgba(40,30,10,.18);
  --shadow-lg: 0 24px 64px -24px rgba(20,30,18,.45);
  --r-sm:6px; --r:10px; --r-lg:16px; --r-xl:22px;
  --ui:"Hanken Grotesque", system-ui, sans-serif;
  --serif:"Spectral", Georgia, serif;
  --mono:"Space Mono", ui-monospace, monospace;
}
[data-theme="dark"]{
  --paper:#15211B; --surface:#1C2A22; --surface-2:#22332A; --surface-3:#2B3E33;
  --ink:#EDE7D6; --ink-soft:#A9B3A2; --ink-faint:#7E8C7C;
  --line:#33473B; --line-soft:#2A3B31;
  --pine:#4FB286; --pine-deep:#3C9C72; --rust:#E0794B; --rust-soft:#C56A41;
  --alpine:#5FA8C6; --gold:#E0B452; --snow:#0F1813;
  --accent:var(--pine); --accent-ink:#0F1813;
  --shadow: 0 1px 2px rgba(0,0,0,.3), 0 10px 28px -14px rgba(0,0,0,.6);
  --shadow-lg: 0 28px 70px -24px rgba(0,0,0,.7);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--paper);color:var(--ink);font-family:var(--ui);font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow:hidden}
#root{height:100%}
::selection{background:var(--rust);color:#fff}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line);border:3px solid transparent;background-clip:content-box;border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--ink-faint);border:3px solid transparent;background-clip:content-box}
.serif{font-family:var(--serif)} .mono{font-family:var(--mono)}

/* ---- shell ---- */
.mv{display:flex;height:100%;overflow:hidden}

/* ---- side panel ---- */
.mv-panel{width:340px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;z-index:5;box-shadow:var(--shadow)}
.mv-brand{display:flex;align-items:center;gap:12px;padding:18px 20px 14px}
.mv-brand .mark{width:40px;height:40px;border-radius:11px;background:linear-gradient(150deg,var(--rust),#9b3f22);display:grid;place-items:center;color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12),0 4px 10px rgba(0,0,0,.25);flex-shrink:0}
.mv-brand h1{font-family:var(--serif);font-size:18px;font-weight:700;margin:0;line-height:1.05;white-space:nowrap}
.mv-brand .sub{font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-top:2px;white-space:nowrap}
.mv-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.mv-stat{background:var(--surface);padding:10px 8px;text-align:center}
.mv-stat .n{font-family:var(--mono);font-weight:700;font-size:18px;line-height:1}
.mv-stat .l{font-size:9.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-faint);font-weight:800;margin-top:4px}
.mv-search{padding:14px 16px 8px}
.mv-search .box{display:flex;align-items:center;gap:9px;background:var(--paper);border:1.5px solid var(--line);border-radius:10px;padding:9px 12px}
.mv-search .box:focus-within{border-color:var(--pine)}
.mv-search input{border:none;background:none;outline:none;flex:1;font-size:14px;font-weight:600;color:var(--ink);min-width:0}
.mv-search svg{color:var(--ink-faint);flex-shrink:0}
.mv-chips{display:flex;flex-wrap:wrap;gap:6px;padding:6px 16px 12px}
.mv-chip{font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:99px;border:1.5px solid var(--line);background:var(--surface);color:var(--ink-soft);display:flex;align-items:center;gap:6px}
.mv-chip .cdot{width:8px;height:8px;border-radius:99px}
.mv-chip.on{color:#fff;border-color:transparent}
.mv-chip:hover{border-color:var(--ink-faint)}
.mv-listhdr{padding:6px 18px;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-faint);font-weight:800;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line-soft)}
.mv-list{flex:1;overflow-y:auto;padding:6px 10px 30px}
.lineitem{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:10px;cursor:pointer;border:1px solid transparent}
.lineitem:hover{background:var(--surface-2)}
.lineitem.sel{background:color-mix(in oklab,var(--pine) 10%,var(--surface));border-color:color-mix(in oklab,var(--pine) 35%,var(--line))}
.lineitem .ldot{width:11px;height:11px;border-radius:99px;flex-shrink:0;margin-top:3px;align-self:flex-start}
.lineitem .lmain{min-width:0;flex:1}
.lineitem .lname{font-weight:700;font-size:13.5px;font-family:var(--serif)}
.lineitem .lsub{font-size:11px;color:var(--ink-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lineitem .lmeta{font-family:var(--mono);font-size:10.5px;color:var(--ink-soft);margin-top:2px}
.lineitem .lstops{font-family:var(--mono);font-size:11px;color:var(--ink-faint);flex-shrink:0;text-align:right;align-self:flex-start}

/* ---- map area ---- */
.mv-map{flex:1;position:relative;min-width:0;background:var(--surface-3);overflow:hidden}
.mv-svg{width:100%;height:100%;display:block;cursor:grab;touch-action:none}
.mv-svg.grabbing{cursor:grabbing}
.mv-top{position:absolute;top:14px;left:16px;right:124px;display:flex;align-items:flex-start;gap:10px;pointer-events:none;z-index:3}
.mv-back{pointer-events:auto;display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:9px 13px;font-weight:700;font-size:13px;box-shadow:var(--shadow);text-decoration:none}
.mv-back:hover{border-color:var(--pine);color:var(--pine)}
.mv-hint{pointer-events:none;margin-left:auto;background:rgba(20,30,22,.5);color:#F3ECDC;font-size:11.5px;font-weight:600;padding:7px 11px;border-radius:8px;backdrop-filter:blur(3px)}

.mv-zoom{position:absolute;right:16px;bottom:16px;z-index:3;display:flex;flex-direction:column;gap:6px}
.mv-zoom button{width:40px;height:40px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--ink);font-size:20px;font-weight:700;display:grid;place-items:center;box-shadow:var(--shadow)}
.mv-zoom button:hover{border-color:var(--pine);color:var(--pine)}
.mv-zoom button.sm{font-size:11px;font-weight:800;letter-spacing:.3px}

.mv-legend{position:absolute;left:16px;bottom:16px;z-index:3;background:rgba(20,30,22,.55);backdrop-filter:blur(4px);color:#F3ECDC;border-radius:10px;padding:11px 13px;max-width:230px}
.mv-legend .lg-t{font-size:10px;text-transform:uppercase;letter-spacing:.6px;font-weight:800;color:#9DBBA8;margin-bottom:7px}
.mv-legend .lg-row{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;padding:2px 0}
.mv-legend .lg-row .sw{width:14px;height:4px;border-radius:9px;flex-shrink:0}
.mv-legend .lg-foot{font-size:10.5px;color:#9DBBA8;margin-top:8px;border-top:1px solid rgba(255,255,255,.15);padding-top:7px;line-height:1.4}

.mv-tip{position:absolute;z-index:6;pointer-events:none;background:var(--pine-deep);color:#F3ECDC;padding:9px 12px;border-radius:10px;box-shadow:0 12px 30px rgba(0,0,0,.4);transform:translate(-50%,calc(-100% - 14px));white-space:nowrap;border:1px solid rgba(255,255,255,.12)}
.mv-tip .t-name{font-family:var(--serif);font-weight:600;font-size:14px}
.mv-tip .t-sub{font-size:11px;color:#9DBBA8;margin-top:2px}
.mv-tip .t-meta{display:flex;gap:12px;font-family:var(--mono);font-size:11.5px;margin-top:5px}

/* station/route detail card */
.mv-detail{position:absolute;top:14px;right:16px;z-index:4;width:300px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);overflow:hidden;animation:mvpop .2s ease}
@keyframes mvpop{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.mv-detail .d-head{padding:15px 16px;color:#fff;position:relative}
.mv-detail .d-head h3{font-family:var(--serif);font-size:18px;font-weight:700;margin:0;line-height:1.1}
.mv-detail .d-head .d-tag{font-size:12px;font-weight:600;opacity:.9;margin-top:3px}
.mv-detail .d-close{position:absolute;top:11px;right:11px;width:28px;height:28px;border-radius:99px;background:rgba(255,255,255,.2);border:none;color:#fff;display:grid;place-items:center}
.mv-detail .d-close:hover{background:rgba(255,255,255,.35)}
.mv-detail .d-body{padding:13px 16px 15px;max-height:46vh;overflow-y:auto}
.mv-detail .d-stat{display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;color:var(--ink-soft)}
.mv-detail .d-stat b{color:var(--ink);font-family:var(--mono);font-weight:700}
.mv-stops{margin-top:12px;border-top:1px solid var(--line);padding-top:11px}
.mv-stops .ss-t{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-faint);font-weight:800;margin-bottom:9px}
.stoprow{display:grid;grid-template-columns:18px 1fr auto;gap:9px;align-items:center;padding:2px 0}
.stoprow .sdot{width:11px;height:11px;border-radius:99px;border:2.5px solid var(--accent);background:var(--surface);justify-self:center}
.stoprow.end .sdot{background:var(--accent)}
.stoprow .sname{font-weight:600;font-size:13px}
.stoprow .selev{font-family:var(--mono);font-size:11px;color:var(--ink-faint)}
.mv-openbtn{display:block;width:100%;margin-top:13px;background:var(--pine);color:#fff;border:none;border-radius:10px;padding:11px;font-weight:700;font-size:13.5px;text-align:center;text-decoration:none}
.mv-openbtn:hover{background:var(--pine-deep)}
[data-theme="dark"] .mv-openbtn{color:var(--snow)}

.mv-themebtn{position:absolute;top:14px;right:74px;z-index:3;width:40px;height:40px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--ink);display:grid;place-items:center;box-shadow:var(--shadow);pointer-events:auto}
.mv-themebtn:hover{border-color:var(--pine);color:var(--pine)}

@media (max-width:760px){
  .mv-panel{width:100%;position:absolute;inset:0;z-index:10}
  .mv-map{position:absolute;inset:0}
}
</style>
</head>
<body data-theme="light">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script src="data-americas.js"></script>
<script src="data-europe.js"></script>
<script src="data-asia.js"></script>
<script src="data-southern.js"></script>
<script src="data-extra-euas.js"></script>
<script src="data-extra-world.js"></script>
<script type="text/babel" src="mapviewer.jsx"></script>
</body>
</html>

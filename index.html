<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Choo Choo Chooser — Denver Rail</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Hanken+Grotesque:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{
  --paper:#F3ECDC;
  --surface:#FBF6EC;
  --surface-2:#EFE6D3;
  --surface-3:#E7DCC4;
  --ink:#21271F;
  --ink-soft:#5C6253;
  --ink-faint:#8A8B79;
  --line:#DCCFB4;
  --line-soft:#E7DDC8;
  --pine:#1E4A37;
  --pine-deep:#143226;
  --rust:#BB5430;
  --rust-soft:#D98B5E;
  --alpine:#2E6E8E;
  --gold:#C99227;
  --snow:#FFFFFF;
  --accent:var(--pine);
  --accent-ink:#FBF6EC;
  --shadow: 0 1px 2px rgba(40,30,10,.05), 0 8px 24px -12px rgba(40,30,10,.18);
  --shadow-lg: 0 24px 64px -24px rgba(20,30,18,.45);
  --r-sm:6px; --r:10px; --r-lg:16px; --r-xl:22px;
  --ui:"Hanken Grotesque", system-ui, sans-serif;
  --serif:"Spectral", Georgia, serif;
  --mono:"Space Mono", ui-monospace, monospace;
}
[data-theme="dark"]{
  --paper:#15211B;
  --surface:#1C2A22;
  --surface-2:#22332A;
  --surface-3:#2B3E33;
  --ink:#EDE7D6;
  --ink-soft:#A9B3A2;
  --ink-faint:#7E8C7C;
  --line:#33473B;
  --line-soft:#2A3B31;
  --pine:#4FB286;
  --pine-deep:#3C9C72;
  --rust:#E0794B;
  --rust-soft:#C56A41;
  --alpine:#5FA8C6;
  --gold:#E0B452;
  --snow:#0F1813;
  --accent:var(--pine);
  --accent-ink:#0F1813;
  --shadow: 0 1px 2px rgba(0,0,0,.3), 0 10px 28px -14px rgba(0,0,0,.6);
  --shadow-lg: 0 28px 70px -24px rgba(0,0,0,.7);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--ui);
  font-size:15px;
  line-height:1.45;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
#root{height:100%}
::selection{background:var(--rust);color:#fff}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-thumb{background:var(--line);border:3px solid transparent;background-clip:content-box;border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--ink-faint);border:3px solid transparent;background-clip:content-box}

/* ---- typography helpers ---- */
.serif{font-family:var(--serif)}
.mono{font-family:var(--mono)}
.tnum{font-variant-numeric:tabular-nums}

/* ---- app frame ---- */
.app{display:flex;flex-direction:column;height:100%;overflow:hidden}
.topbar{
  display:flex;align-items:center;gap:14px;
  padding:12px 22px;
  background:var(--pine-deep);
  color:#F3ECDC;
  border-bottom:1px solid rgba(0,0,0,.2);
  position:relative;z-index:30;
  --ctl:48px;
}
[data-theme="dark"] .topbar{background:#0E1812}
.brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
.brand .mark{
  width:var(--ctl);height:var(--ctl);border-radius:13px;
  background:linear-gradient(150deg,var(--rust),#9b3f22);
  display:grid;place-items:center;color:#fff;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.12), 0 4px 10px rgba(0,0,0,.3);
}
.brand h1{font-family:var(--serif);font-size:21px;font-weight:700;margin:0;letter-spacing:.2px;color:#F8F2E4;line-height:1;white-space:nowrap}
.brand .sub{font-size:11.5px;color:#9DBBA8;letter-spacing:.4px;text-transform:uppercase;margin-top:3px;font-weight:600;white-space:nowrap}

.searchwrap{display:flex;align-items:stretch;gap:3px;background:rgba(255,255,255,.1);padding:4px;border-radius:12px;flex:1;min-width:0;max-width:880px;height:var(--ctl)}
.searchfield{display:flex;align-items:center;gap:8px;padding:4px 13px;background:rgba(255,255,255,.06);flex:1;min-width:0;border-radius:8px}
.searchfield:first-child{border-radius:8px 4px 4px 8px}
.searchfield:last-of-type{border-radius:4px 8px 8px 4px}
.searchfield label{font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;color:#8FAE9C;font-weight:800;display:block;line-height:1.2}
.searchfield input{background:none;border:none;color:#F3ECDC;font-size:14px;font-weight:600;outline:none;width:100%;padding:0;line-height:1.45;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.searchfield input::placeholder{color:#6E8A7A}
.dtf .dtf-lbl{line-height:1.2}
.dtf .dtf-val{line-height:1.45;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:auto;padding-left:6px}
.iconbtn{height:var(--ctl);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:#E7E0CF;border-radius:11px;padding:0 13px;display:flex;align-items:center;gap:7px;font-weight:600;font-size:13px;white-space:nowrap}
.iconbtn:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.24)}

/* ---- body split ---- */
.body{display:flex;flex:1;min-height:0}
.filters{
  width:268px;flex-shrink:0;background:var(--surface);
  border-right:1px solid var(--line);
  overflow-y:auto;padding:20px 20px 60px;
}
.fgroup{margin-bottom:24px}
.fgroup > h3{
  font-size:11px;text-transform:uppercase;letter-spacing:.8px;
  color:var(--ink-faint);font-weight:800;margin:0 0 11px;
}
.checkrow{display:flex;align-items:center;gap:10px;padding:6px 0;cursor:pointer;user-select:none}
.checkrow:hover .cbox{border-color:var(--accent)}
.cbox{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--line);flex-shrink:0;display:grid;place-items:center;background:var(--surface);transition:.12s}
.checkrow.on .cbox{background:var(--accent);border-color:var(--accent)}
.cbox svg{opacity:0;transform:scale(.6);transition:.12s}
.checkrow.on .cbox svg{opacity:1;transform:scale(1)}
.checkrow .lbl{font-size:13.5px;font-weight:500;flex:1}
.checkrow .cnt{font-size:12px;color:var(--ink-faint);font-family:var(--mono)}

.opchip{display:inline-flex;align-items:flex-start;gap:7px}
.opdot{width:9px;height:9px;border-radius:99px;flex-shrink:0;margin-top:5px}

.slider-wrap{padding:4px 2px 0}
.slider-wrap input[type=range]{width:100%;accent-color:var(--accent);height:4px}
.slider-val{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;color:var(--ink-soft);margin-top:7px}

.pillrow{display:flex;flex-wrap:wrap;gap:7px}
.pill{font-size:12px;padding:6px 11px;border-radius:99px;border:1.5px solid var(--line);background:var(--surface);color:var(--ink-soft);font-weight:600}
.pill.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.pill:hover{border-color:var(--accent)}

.clearbtn{width:100%;text-align:center;padding:9px;border:1px dashed var(--line);background:none;border-radius:9px;color:var(--ink-soft);font-weight:600;font-size:12.5px}
.clearbtn:hover{border-color:var(--rust);color:var(--rust)}

/* ---- results ---- */
.results{flex:1;min-width:0;overflow-y:auto;background:var(--paper)}
.results-head{
  position:sticky;top:0;z-index:10;
  display:flex;align-items:center;gap:16px;
  padding:18px 30px;background:var(--paper);
  border-bottom:1px solid var(--line);
}
.results-head .count{font-family:var(--serif);font-size:19px;font-weight:600}
.results-head .count em{font-style:normal;color:var(--ink-faint);font-weight:500}
.rh-spacer{flex:1}
.sortsel,.laytoggle{display:flex;align-items:center;gap:8px}
.sortsel label{font-size:12px;color:var(--ink-faint);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.sortsel select{
  background:var(--surface);border:1.5px solid var(--line);border-radius:9px;
  padding:8px 12px;font-weight:600;font-size:13px;color:var(--ink);outline:none;
}
.sortsel select:focus{border-color:var(--accent)}
.segbtns{display:flex;background:var(--surface-2);border-radius:9px;padding:3px}
.segbtns button{background:none;border:none;padding:7px 11px;border-radius:7px;color:var(--ink-faint);display:grid;place-items:center}
.segbtns button.on{background:var(--surface);color:var(--accent);box-shadow:var(--shadow)}

.cards{padding:22px 30px 80px;display:flex;flex-direction:column;gap:16px}

/* ---- route card ---- */
.card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);
  box-shadow:var(--shadow);overflow:hidden;cursor:pointer;
  display:grid;grid-template-columns:200px 1fr;transition:transform .14s, box-shadow .14s, border-color .14s;
}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--accent)}
.card-photo{position:relative;min-height:172px;overflow:hidden;background:var(--surface-3)}
.card-photo .scene{position:absolute;inset:0}
.card-photo .ribbon{
  position:absolute;top:10px;left:10px;z-index:2;
  font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;
  padding:5px 9px;border-radius:7px;color:#fff;backdrop-filter:blur(3px);
  background:rgba(20,30,22,.55);border:1px solid rgba(255,255,255,.18);
}
.card-photo .scenic{
  position:absolute;bottom:10px;left:10px;z-index:2;display:flex;align-items:center;gap:5px;
  font-size:11px;font-weight:700;color:#fff;background:rgba(20,30,22,.5);
  padding:4px 8px;border-radius:7px;backdrop-filter:blur(3px);
}
.card-body{padding:18px 20px;display:flex;flex-direction:column;min-width:0}
.card-top{display:flex;align-items:flex-start;gap:12px}
.card-title{flex:1;min-width:0}
.card-title h2{font-family:var(--serif);font-size:20px;font-weight:600;margin:0;line-height:1.1}
.card-title .tag{font-size:12.5px;color:var(--ink-soft);font-weight:600;margin-top:2px}
.opbadge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:5px 9px;border-radius:99px;flex-shrink:0}

.routeline{display:flex;align-items:center;gap:10px;margin:14px 0 4px;color:var(--ink)}
.routeline .ep{font-weight:700;font-size:14.5px}
.routeline .dots{flex:1;height:0;border-top:2px dotted var(--line);position:relative;min-width:20px}
.routeline .dots svg{position:absolute;right:-2px;top:-9px;color:var(--accent)}
.via{font-size:12px;color:var(--ink-faint);margin-bottom:14px}

.metrics{display:flex;flex-wrap:wrap;gap:18px 26px;margin-top:auto;padding-top:14px;border-top:1px solid var(--line-soft)}
.metric .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-faint);font-weight:800}
.metric .v{font-family:var(--mono);font-size:15px;font-weight:700;margin-top:2px;display:flex;align-items:baseline;gap:3px}
.metric .v .u{font-size:11px;color:var(--ink-faint);font-weight:400}
.metric.price .v{color:var(--rust);font-size:18px}
.spark{width:108px;height:38px}

/* compact table */
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl thead th{
  position:sticky;top:0;text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;
  color:var(--ink-faint);font-weight:800;padding:10px 14px;background:var(--surface-2);border-bottom:1px solid var(--line);
}
.tbl tbody tr{border-bottom:1px solid var(--line-soft);cursor:pointer}
.tbl tbody tr:hover{background:var(--surface)}
.tbl td{padding:13px 14px;vertical-align:middle}
.tbl .t-name{font-family:var(--serif);font-size:16px;font-weight:600}
.tbl .t-sub{font-size:11.5px;color:var(--ink-faint)}
.tbl .num{font-family:var(--mono);font-weight:700}
.tbl .t-price{color:var(--rust);font-weight:700;font-family:var(--mono);font-size:15px}

.empty{padding:80px 30px;text-align:center;color:var(--ink-faint)}
.empty .serif{font-size:22px;color:var(--ink-soft);display:block;margin-bottom:6px}

/* ---- detail overlay ---- */
.scrim{position:fixed;inset:0;z-index:50;background:rgba(15,20,15,.5);backdrop-filter:blur(4px);
  display:flex;justify-content:flex-end;animation:fade .2s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.detail{
  width:min(880px,94vw);height:100%;background:var(--paper);overflow-y:auto;
  box-shadow:var(--shadow-lg);animation:slidein .26s cubic-bezier(.2,.8,.2,1);position:relative;
}
@keyframes slidein{from{transform:translateX(40px);opacity:.4}to{transform:none;opacity:1}}
.detail-close{position:absolute;top:16px;right:16px;z-index:20;width:40px;height:40px;border-radius:99px;
  background:rgba(20,28,20,.55);color:#fff;border:1px solid rgba(255,255,255,.2);display:grid;place-items:center;backdrop-filter:blur(4px)}
.detail-close:hover{background:rgba(20,28,20,.8)}

.hero{position:relative;height:340px;overflow:hidden}
.hero .scene{position:absolute;inset:0}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,16,10,.82) 4%,rgba(10,16,10,.1) 46%,transparent)}
.hero-info{position:absolute;left:0;right:0;bottom:0;padding:26px 30px;color:#fff;z-index:2}
.hero-info .opbadge{margin-bottom:10px}
.hero-info h1{font-family:var(--serif);font-size:36px;font-weight:700;margin:0;line-height:1.02;text-shadow:0 2px 14px rgba(0,0,0,.4)}
.hero-info .htag{font-size:14px;font-weight:600;color:#E8DFC9;margin-top:5px;text-shadow:0 1px 8px rgba(0,0,0,.5)}

/* gallery thumbs */
.thumbs{position:absolute;bottom:24px;right:24px;z-index:3;display:flex;gap:8px}
.thumbs button{width:54px;height:40px;border-radius:7px;overflow:hidden;border:2px solid rgba(255,255,255,.4);position:relative;padding:0;background:none}
.thumbs button.on{border-color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.thumbs button .scene{position:absolute;inset:0}
.caption{padding:11px 30px;background:var(--surface-2);font-size:12.5px;color:var(--ink-soft);font-weight:600;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line)}

.dsection{padding:26px 30px;border-bottom:1px solid var(--line)}
.dsection h3{font-size:12px;text-transform:uppercase;letter-spacing:.9px;color:var(--ink-faint);font-weight:800;margin:0 0 16px;display:flex;align-items:center;gap:9px}
.dsection h3 .ln{flex:1;height:1px;background:var(--line)}
.blurb{font-family:var(--serif);font-size:18px;line-height:1.5;color:var(--ink);margin:0;text-wrap:pretty}

.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:4px}
.statcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px}
.statcard .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-faint);font-weight:800;display:flex;align-items:center;gap:6px}
.statcard .v{font-family:var(--mono);font-size:23px;font-weight:700;margin-top:7px;line-height:1}
.statcard .v .u{font-size:12px;color:var(--ink-faint);font-weight:400;margin-left:2px}
.statcard.accent{background:var(--pine);border-color:var(--pine)}
.statcard.accent .k{color:#A9CDBA}
.statcard.accent .v{color:#fff}
[data-theme="dark"] .statcard.accent{background:var(--surface-3)}
[data-theme="dark"] .statcard.accent .v{color:var(--ink)}

/* speed gauge bar */
.speedbar{height:9px;border-radius:99px;background:var(--surface-3);overflow:hidden;margin-top:9px}
.speedbar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--alpine),var(--pine))}

/* amenities */
.amgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.amitem{display:flex;align-items:center;gap:11px;padding:11px 13px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r)}
.amitem .ai{width:34px;height:34px;border-radius:9px;background:var(--surface-2);display:grid;place-items:center;color:var(--accent);flex-shrink:0}
.amitem .at{font-size:13.5px;font-weight:600}

/* fares */
.fares{display:flex;flex-direction:column;gap:10px}
.fare{display:flex;align-items:center;gap:14px;padding:15px 17px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg)}
.fare .fname{font-weight:700;font-size:15px}
.fare .fnote{font-size:12.5px;color:var(--ink-faint);margin-top:2px}
.fare .fprice{margin-left:auto;font-family:var(--mono);font-size:22px;font-weight:700;color:var(--rust)}
.fare .fprice .from{display:block;font-size:10px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.5px;font-family:var(--ui);text-align:right;font-weight:700}
.disc{display:flex;flex-direction:column;gap:9px;margin-top:16px}
.discitem{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border-radius:var(--r);background:var(--surface-2)}
.discitem .badge{font-family:var(--mono);font-weight:700;font-size:12px;color:#fff;background:var(--gold);padding:4px 8px;border-radius:7px;flex-shrink:0;min-width:46px;text-align:center}
[data-theme="dark"] .discitem .badge{color:#1a1208}
.discitem .dn{font-weight:700;font-size:13.5px}
.discitem .dd{font-size:12.5px;color:var(--ink-soft);margin-top:1px}

/* timetable */
.timetable{display:flex;flex-direction:column}
.ttrow{display:grid;grid-template-columns:64px 26px 1fr auto;gap:14px;align-items:center;padding:4px 0}
.ttrow .tt-time{font-family:var(--mono);font-weight:700;font-size:14px;text-align:right}
.tt-rail{display:flex;flex-direction:column;align-items:center;height:100%}
.tt-dot{width:13px;height:13px;border-radius:99px;border:3px solid var(--accent);background:var(--surface);z-index:2}
.tt-row-first .tt-dot,.tt-row-last .tt-dot{background:var(--accent)}
.tt-stem{flex:1;width:2px;background:var(--line);margin:-1px 0}
.ttrow .tt-name{font-weight:600;font-size:14.5px}
.ttrow .tt-elev{font-family:var(--mono);font-size:12px;color:var(--ink-faint)}

/* elevation chart */
.elevwrap{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px 18px 8px;overflow:hidden}
.elev-summary{display:flex;gap:26px;margin-bottom:14px;flex-wrap:wrap}
.elev-summary .es{display:flex;align-items:center;gap:8px}
.elev-summary .es .arrow{width:26px;height:26px;border-radius:7px;display:grid;place-items:center}
.elev-summary .es .arrow.up{background:rgba(187,84,48,.14);color:var(--rust)}
.elev-summary .es .arrow.down{background:rgba(46,110,142,.16);color:var(--alpine)}
.elev-summary .es .arrow.peak{background:rgba(201,146,39,.16);color:var(--gold)}
.elev-summary .es .et{font-family:var(--mono);font-weight:700;font-size:15px}
.elev-summary .es .el{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-faint);font-weight:800}
.elev-tip{position:absolute;pointer-events:none;background:var(--pine-deep);color:#F3ECDC;padding:7px 10px;border-radius:8px;font-size:12px;font-weight:600;transform:translate(-50%,-130%);white-space:nowrap;box-shadow:0 8px 20px rgba(0,0,0,.3);z-index:5;opacity:0;transition:opacity .1s}
.elev-tip .tipft{font-family:var(--mono);font-size:15px;font-weight:700;display:block}
.elev-tip .tipmi{color:#9DBBA8;font-size:11px}

/* map */
.mapwrap{position:relative;border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--line);background:var(--surface-3)}
.maplabel{position:absolute;top:12px;left:12px;z-index:3;font-size:11px;font-weight:700;background:rgba(20,30,22,.55);color:#fff;padding:5px 9px;border-radius:7px;backdrop-filter:blur(3px);white-space:nowrap}
.maplegend{position:absolute;bottom:12px;right:12px;z-index:3;display:flex;gap:14px;background:rgba(20,30,22,.55);color:#fff;padding:7px 11px;border-radius:8px;font-size:11px;font-weight:600;backdrop-filter:blur(3px)}
.maplegend .lg{display:flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0}

@media (max-width:880px){
  .card{grid-template-columns:1fr}
  .card-photo{min-height:150px}
  .statgrid{grid-template-columns:repeat(2,1fr)}
}

/* ---- map (split) view ---- */
.results.map-mode{display:flex;flex-direction:column;overflow:hidden}
.results.map-mode .results-head{position:static}
.splitwrap{display:flex;flex:1;min-height:0}
.listcol{width:340px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--line);padding:14px 15px 60px;background:var(--paper)}
.listcol .lc-hint{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-faint);font-weight:800;margin:2px 2px 12px}
.mapcol{flex:1;position:relative;min-width:0;background:var(--surface-3);overflow:hidden}
.minirow{display:flex;align-items:center;gap:11px;padding:12px 13px;border-radius:var(--r);border:1px solid var(--line);background:var(--surface);cursor:pointer;margin-bottom:9px;transition:transform .12s,border-color .12s,box-shadow .12s}
.minirow:hover,.minirow.hot{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-1px)}
.minirow .mdot{width:11px;height:11px;border-radius:99px;flex-shrink:0;margin-top:4px;align-self:flex-start}
.minirow .mmain{min-width:0;flex:1}
.minirow .mname{font-weight:700;font-size:14px;font-family:var(--serif)}
.minirow .msub{font-size:11.5px;color:var(--ink-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.minirow .mmeta{font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-top:3px}
.minirow .mprice{margin-left:auto;font-family:var(--mono);font-weight:700;color:var(--rust);font-size:14px;text-align:right;flex-shrink:0;align-self:flex-start}
.maptip{position:absolute;pointer-events:none;z-index:10;background:var(--pine-deep);color:#F3ECDC;padding:10px 13px;border-radius:10px;box-shadow:0 12px 30px rgba(0,0,0,.4);transform:translate(-50%,calc(-100% - 16px));white-space:nowrap;opacity:0;transition:opacity .1s;border:1px solid rgba(255,255,255,.12)}

/* ---- feeling lucky button ---- */
.luckybtn{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--rust),#9b3f22);color:#fff;border:none;border-radius:10px;padding:9px 15px;font-weight:700;font-size:13.5px;box-shadow:0 2px 8px -2px rgba(150,60,30,.5);transition:transform .12s,box-shadow .12s}
.luckybtn:hover{transform:translateY(-1px);box-shadow:0 6px 16px -4px rgba(150,60,30,.6)}
.luckybtn:active{transform:translateY(0)}
.luckybtn .dice{display:inline-flex}
.luckybtn.rolling .dice{animation:roll .5s ease-in-out infinite}
@keyframes roll{0%{transform:rotate(0)}25%{transform:rotate(-22deg) scale(1.1)}75%{transform:rotate(22deg) scale(1.1)}100%{transform:rotate(0)}}

/* ---- booking bar (in detail) ---- */
.bookbar{position:sticky;bottom:0;z-index:15;display:flex;align-items:center;gap:16px;padding:16px 30px;background:var(--surface);border-top:1px solid var(--line);box-shadow:0 -8px 24px -16px rgba(20,30,18,.4)}
.bookbar .bb-price{font-family:var(--mono);font-size:13px;color:var(--ink-soft)}
.bookbar .bb-price strong{font-size:22px;color:var(--rust);display:block;line-height:1.1}
.bookbar .bb-cta{margin-left:auto;background:var(--pine);color:#fff;border:none;border-radius:11px;padding:14px 28px;font-weight:700;font-size:15px;box-shadow:var(--shadow);transition:transform .12s,background .12s}
.bookbar .bb-cta:hover{transform:translateY(-1px);background:var(--pine-deep)}
[data-theme="dark"] .bookbar .bb-cta{color:var(--snow)}
.fare .fselect{margin-left:14px;background:var(--surface-2);border:1.5px solid var(--line);color:var(--ink);border-radius:9px;padding:9px 16px;font-weight:700;font-size:13px;transition:.12s;flex-shrink:0}
.fare .fselect:hover{border-color:var(--pine);color:var(--pine);background:var(--surface)}

/* ---- checkout modal ---- */
.co-scrim{position:fixed;inset:0;z-index:60;background:rgba(12,18,12,.62);backdrop-filter:blur(5px);display:grid;place-items:center;padding:24px;animation:fade .18s ease}
.co-modal{width:min(520px,100%);max-height:92vh;display:flex;flex-direction:column;background:var(--paper);border-radius:var(--r-xl);box-shadow:var(--shadow-lg);overflow:hidden;animation:popin .24s cubic-bezier(.2,.9,.3,1.1)}
@keyframes popin{from{transform:scale(.94) translateY(12px);opacity:0}to{transform:none;opacity:1}}
.co-head{display:flex;align-items:flex-start;gap:14px;padding:22px 24px 16px;border-bottom:1px solid var(--line)}
.co-head > div:first-child{flex:1;min-width:0}
.co-head h2{font-family:var(--serif);font-size:23px;font-weight:700;margin:0;line-height:1.05}
.co-head .co-sub{font-size:13px;color:var(--ink-soft);font-weight:600;margin-top:3px}
.co-close{margin-left:auto;width:34px;height:34px;border-radius:99px;background:var(--surface-2);border:none;color:var(--ink-soft);display:grid;place-items:center;flex-shrink:0}
.co-close:hover{background:var(--surface-3);color:var(--ink)}
.co-steps{display:flex;align-items:center;gap:10px;padding:14px 24px;font-size:11.5px;font-weight:800;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.4px;background:var(--surface-2)}
.co-steps .on{color:var(--pine)}
.co-stepline{flex:1;height:2px;background:var(--line);border-radius:9px}
.co-body{padding:20px 24px;overflow-y:auto;flex:1}
.co-field{margin-bottom:18px}
.co-field > label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-faint);font-weight:800;margin-bottom:8px}
.co-input{width:100%;background:var(--surface);border:1.5px solid var(--line);border-radius:10px;padding:12px 13px;font-size:15px;font-weight:600;color:var(--ink);outline:none;transition:border-color .12s}
.co-input:focus{border-color:var(--pine)}
.co-row2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.co-cardnum{position:relative}
.co-cardicons{position:absolute;right:12px;top:50%;transform:translateY(-50%);display:flex;gap:4px}
.co-cardicons i{width:22px;height:14px;border-radius:3px;display:inline-block;opacity:.8}
.fareopts{display:flex;flex-direction:column;gap:9px}
.fareopt{display:flex;align-items:center;gap:12px;text-align:left;background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:13px 15px;transition:.12s}
.fareopt:hover{border-color:var(--pine)}
.fareopt.on{border-color:var(--pine);background:color-mix(in oklab,var(--pine) 7%,var(--surface))}
.fo-radio{width:18px;height:18px;border-radius:99px;border:2px solid var(--line);flex-shrink:0;position:relative}
.fareopt.on .fo-radio{border-color:var(--pine)}
.fareopt.on .fo-radio:after{content:"";position:absolute;inset:3px;border-radius:99px;background:var(--pine)}
.fo-main{flex:1;min-width:0}
.fo-name{display:block;font-weight:700;font-size:14.5px}
.fo-note{display:block;font-size:12px;color:var(--ink-faint)}
.fo-price{font-size:16px;font-weight:700;color:var(--rust)}
.stepper-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line-soft)}
.stepper-row:last-child{border-bottom:none}
.sr-label{font-weight:600;font-size:14.5px}
.sr-sub{font-size:11.5px;color:var(--ink-faint)}
.stepper{display:flex;align-items:center;gap:4px;background:var(--surface-2);border-radius:10px;padding:4px}
.stepper button{width:32px;height:32px;border-radius:8px;border:none;background:var(--surface);color:var(--ink);font-size:19px;font-weight:700;display:grid;place-items:center;box-shadow:var(--shadow)}
.stepper button:disabled{opacity:.35;box-shadow:none}
.stepper-val{min-width:26px;text-align:center;font-weight:700;font-size:15px}
.co-secure{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-faint);font-weight:600;margin-top:4px}
.co-foot{padding:16px 24px 20px;border-top:1px solid var(--line);background:var(--surface)}
.co-breakdown{margin-bottom:14px}
.bd-row{display:flex;justify-content:space-between;font-size:13.5px;padding:5px 0;color:var(--ink-soft)}
.bd-row.disc{color:var(--pine)}
.bd-row.bd-total{border-top:1px solid var(--line);margin-top:5px;padding-top:11px;font-size:17px;font-weight:700;color:var(--ink)}
.bd-fee{display:inline-flex;align-items:center;gap:5px}
.bd-info{color:var(--ink-faint);cursor:help;font-size:12px}
.co-cta{width:100%;background:var(--pine);color:#fff;border:none;border-radius:12px;padding:15px;font-weight:700;font-size:16px;display:grid;place-items:center;min-height:52px;transition:background .12s,transform .12s}
.co-cta:hover:not(:disabled){background:var(--pine-deep);transform:translateY(-1px)}
.co-cta:disabled{opacity:.5}
[data-theme="dark"] .co-cta{color:var(--snow)}
.co-back{width:100%;background:none;border:none;color:var(--ink-soft);font-weight:600;font-size:13px;margin-top:10px;padding:6px}
.co-back:hover{color:var(--ink)}
.co-spin{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:99px;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ticket{text-align:center;padding:6px 0 2px}
.tk-check{width:62px;height:62px;border-radius:99px;background:color-mix(in oklab,var(--pine) 16%,var(--surface));color:var(--pine);display:grid;place-items:center;margin:0 auto 14px}
.tk-conf{font-size:13px;color:var(--ink-soft);margin-bottom:16px}
.tk-conf strong{color:var(--ink);letter-spacing:.5px}
.tk-stub{text-align:left;background:var(--surface);border:1.5px dashed var(--line);border-radius:14px;padding:18px}
.tk-route{display:flex;align-items:center;justify-content:center;gap:12px;font-size:19px;font-weight:700;padding-bottom:14px;margin-bottom:14px;border-bottom:1px dashed var(--line)}
.tk-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px 18px}
.tk-grid .tk-k{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-faint);font-weight:800}
.tk-grid .tk-v{display:block;font-weight:600;font-size:14px;margin-top:2px}
.tk-paid{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:14px;border-top:1px dashed var(--line);font-size:15px;font-weight:700}
.tk-paid strong{font-size:20px;color:var(--rust)}
.tk-fee{font-size:11.5px;color:var(--ink-faint);margin-top:5px;text-align:right}

/* ---- trip mode + multi-stop ---- */
.tripseg{display:flex;align-items:center;background:rgba(255,255,255,.1);border-radius:12px;padding:4px;gap:2px;flex-shrink:0;height:var(--ctl)}
.tripseg button{background:none;border:none;color:#C9D8CE;font-weight:700;font-size:13px;padding:0 14px;height:100%;border-radius:8px;display:flex;align-items:center;gap:6px;white-space:nowrap}
.tripseg button.on{background:rgba(255,255,255,.18);color:#fff}
.tripseg button:hover:not(.on){color:#fff}
.stopsbar{display:flex;align-items:stretch;gap:4px;background:rgba(255,255,255,.1);padding:4px;border-radius:12px;flex:1;max-width:780px;overflow-x:auto;height:var(--ctl)}
.stopfield{display:flex;align-items:center;gap:8px;padding:4px 12px;background:rgba(255,255,255,.06);border-radius:8px;flex:1;min-width:140px;position:relative}
.stopfield .sf-ic{color:#8FAE9C;flex-shrink:0}
.stopfield label{font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;color:#8FAE9C;font-weight:700;display:block}
.stopfield input{background:none;border:none;color:#F3ECDC;font-size:14px;font-weight:600;outline:none;width:100%;padding:1px 0}
.stopfield input::placeholder{color:#6E8A7A}
.stopfield .rmstop{position:absolute;top:2px;right:3px;width:16px;height:16px;border:none;background:rgba(255,255,255,.14);color:#dde;border-radius:99px;font-size:11px;line-height:1;display:grid;place-items:center}
.stopfield .rmstop:hover{background:var(--rust);color:#fff}
.addstop{background:rgba(255,255,255,.12);border:1px dashed rgba(255,255,255,.3);color:#E7E0CF;border-radius:10px;padding:0 14px;font-weight:700;font-size:13px;flex-shrink:0;white-space:nowrap}
.addstop:hover{background:rgba(255,255,255,.2)}
.plan-label{font-family:var(--serif);font-size:19px;font-weight:600}
.plan-label em{font-style:normal;color:var(--ink-faint);font-weight:500;font-size:14px}

.planner{padding:18px 30px 80px;display:flex;flex-direction:column;gap:20px}
.journey-summary{position:sticky;top:0;z-index:9;display:flex;align-items:center;gap:26px;background:var(--pine-deep);color:#F3ECDC;border-radius:var(--r-lg);padding:16px 22px;box-shadow:var(--shadow-lg)}
[data-theme="dark"] .journey-summary{background:var(--surface-3);color:var(--ink)}
.js-stat .k{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#9DBBA8;font-weight:800}
[data-theme="dark"] .js-stat .k{color:var(--ink-faint)}
.js-stat .v{font-family:var(--mono);font-weight:700;font-size:17px;margin-top:2px}
.js-stat.price .v{font-size:22px}
.js-book{margin-left:auto;background:var(--rust);color:#fff;border:none;border-radius:11px;padding:13px 26px;font-weight:700;font-size:14.5px;box-shadow:0 4px 12px -4px rgba(150,60,30,.5)}
.js-book:hover:not(:disabled){background:#a8482a}
.js-book:disabled{opacity:.45}
.leg{border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;background:var(--surface);box-shadow:var(--shadow)}
.leg-head{display:flex;align-items:center;gap:12px;padding:13px 18px;background:var(--surface-2);border-bottom:1px solid var(--line)}
.leg-num{width:26px;height:26px;border-radius:99px;background:var(--pine);color:#fff;display:grid;place-items:center;font-weight:800;font-size:13px;flex-shrink:0}
[data-theme="dark"] .leg-num{color:var(--snow)}
.leg-route{font-family:var(--serif);font-weight:600;font-size:16px}
.leg-route .arr{color:var(--ink-faint);margin:0 8px}
.leg-count{margin-left:auto;font-size:12px;color:var(--ink-faint);font-weight:600}
.legcard{display:flex;align-items:center;gap:13px;padding:13px 18px;cursor:pointer;border-bottom:1px solid var(--line-soft);transition:background .12s}
.legcard:last-child{border-bottom:none}
.legcard:hover{background:var(--surface-2)}
.legcard.sel{background:color-mix(in oklab,var(--pine) 8%,var(--surface))}
.lc-radio{width:18px;height:18px;border-radius:99px;border:2px solid var(--line);flex-shrink:0;position:relative}
.legcard.sel .lc-radio{border-color:var(--pine)}
.legcard.sel .lc-radio:after{content:"";position:absolute;inset:3px;border-radius:99px;background:var(--pine)}
.lc-dot{width:9px;height:9px;border-radius:99px;flex-shrink:0}
.lc-name{font-weight:700;font-size:14.5px}
.lc-sub{font-size:12px;color:var(--ink-faint)}
.lc-meta{font-family:var(--mono);font-size:11.5px;color:var(--ink-soft);margin-left:auto;text-align:right;white-space:nowrap}
.lc-price{font-family:var(--mono);font-weight:700;color:var(--rust);font-size:15px;min-width:62px;text-align:right}
.lc-open{background:var(--surface-2);border:1.5px solid var(--line);color:var(--ink-soft);border-radius:8px;padding:7px 12px;font-weight:700;font-size:12px;flex-shrink:0}
.lc-open:hover{border-color:var(--pine);color:var(--pine)}
.leg-empty{padding:22px 18px;color:var(--ink-faint);font-size:13.5px;text-align:center}
.rtbadge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:800;color:var(--rust);background:rgba(187,84,48,.12);padding:2px 7px;border-radius:6px;margin-left:7px;vertical-align:middle}
.co-legrow{display:flex;align-items:center;gap:11px;padding:11px 13px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);margin-bottom:8px}
.co-legrow .clr-num{width:22px;height:22px;border-radius:99px;background:var(--surface-2);color:var(--ink-soft);display:grid;place-items:center;font-weight:800;font-size:11px;flex-shrink:0}
.co-legrow .clr-name{font-weight:700;font-size:13.5px}
.co-legrow .clr-sub{font-size:11.5px;color:var(--ink-faint)}
.co-legrow .clr-price{margin-left:auto;font-family:var(--mono);font-weight:700;font-size:13.5px}

/* ---- date-time picker ---- */
.dtf-wrap{position:relative;flex:1;min-width:140px}
.searchwrap .dtf-wrap{flex:1.45}
.topbar > .dtf-wrap{flex:0 0 auto;width:200px;height:var(--ctl)}
.dtf{display:flex;align-items:center;gap:9px;padding:4px 13px;border-radius:8px;background:rgba(255,255,255,.06);width:100%;height:100%;cursor:pointer;border:none;text-align:left}
.dtf:hover{background:rgba(255,255,255,.12)}
.dtf .dtf-ic{color:#8FAE9C;flex-shrink:0;display:inline-flex}
.dtf .dtf-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#8FAE9C;font-weight:700;display:block}
.dtf .dtf-val{font-size:14px;font-weight:600;color:#F3ECDC;white-space:nowrap;display:block}
.dtf .dtf-val.empty{color:#6E8A7A}
.dtf-pop{position:absolute;top:calc(100% + 8px);left:0;z-index:55;background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-lg);padding:15px;width:306px;color:var(--ink)}
.dtf-pop.right{left:auto;right:0}
.dtf-pop.wide{width:330px}
.rng-head{display:flex;align-items:center;gap:8px;margin-bottom:13px;padding-bottom:13px;border-bottom:1px solid var(--line)}
.rng-end{flex:1;background:var(--surface-2);border:1.5px solid transparent;border-radius:10px;padding:8px 11px;min-width:0}
.rng-end.active{border-color:var(--pine);background:color-mix(in oklab,var(--pine) 8%,var(--surface))}
.rng-end .re-k{display:block;font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-faint);font-weight:800}
.rng-end .re-v{display:block;font-weight:700;font-size:13px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rng-arrow{color:var(--ink-faint);font-weight:700;flex-shrink:0}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-head button{width:30px;height:30px;border-radius:8px;border:none;background:var(--surface-2);color:var(--ink);display:grid;place-items:center;cursor:pointer}
.cal-head button:hover{background:var(--surface-3)}
.cal-title{font-weight:700;font-family:var(--serif);font-size:15px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-grid .dow{font-size:10px;text-transform:uppercase;color:var(--ink-faint);font-weight:800;text-align:center;padding:4px 0}
.cal-day{aspect-ratio:1;border:none;background:none;border-radius:8px;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;position:relative}
.cal-day:hover:not(:disabled){background:var(--surface-2)}
.cal-day.inrange{background:color-mix(in oklab,var(--pine) 14%,var(--surface));border-radius:0}
.cal-day.sel{background:var(--pine);color:#fff;z-index:1}
.cal-day.rstart{border-radius:8px 0 0 8px}
.cal-day.rend{border-radius:0 8px 8px 0}
[data-theme="dark"] .cal-day.sel{color:var(--snow)}
.cal-day:disabled{color:var(--ink-faint);opacity:.32;cursor:default}
.time-sec{margin-top:13px;border-top:1px solid var(--line);padding-top:11px}
.time-sec .ts-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-faint);font-weight:800;margin-bottom:8px}
.time-list{display:flex;gap:6px;overflow-x:auto;padding-bottom:5px}
.time-list button{flex-shrink:0;padding:7px 11px;border-radius:8px;border:1.5px solid var(--line);background:var(--surface);font-family:var(--mono);font-size:12.5px;font-weight:700;color:var(--ink-soft);cursor:pointer}
.time-list button:hover{border-color:var(--pine)}
.time-list button.on{background:var(--pine);border-color:var(--pine);color:#fff}
[data-theme="dark"] .time-list button.on{color:var(--snow)}
.time-list .any-opt{border-color:var(--rust);color:var(--rust);font-family:var(--ui);font-weight:700}
.time-list .any-opt.on{background:var(--rust);border-color:var(--rust);color:#fff}
.dtf-done{width:100%;margin-top:11px;background:var(--pine);color:#fff;border:none;border-radius:9px;padding:10px;font-weight:700;cursor:pointer}
[data-theme="dark"] .dtf-done{color:var(--snow)}
.dtf-done:hover{background:var(--pine-deep)}

/* ===== cart / account / payment / auth ===== */
.cartbtn{position:relative}
.cart-badge{position:absolute;top:-6px;right:-6px;min-width:18px;height:18px;padding:0 5px;border-radius:99px;background:var(--rust);color:#fff;font-size:11px;font-weight:800;display:grid;place-items:center;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.acct-av{width:24px;height:24px;border-radius:99px;background:rgba(255,255,255,.2);display:grid;place-items:center;font-size:11px;font-weight:800;color:#F3ECDC;flex-shrink:0}
.acct-av.lg{width:40px;height:40px;font-size:15px;background:var(--pine);color:#fff}
[data-theme="dark"] .acct-av.lg{color:var(--snow)}
.acct-pop{position:absolute;top:calc(100% + 8px);right:0;width:280px;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-lg);padding:14px;z-index:60;color:var(--ink)}
.acct-id{display:flex;gap:11px;align-items:center;padding-bottom:12px;border-bottom:1px solid var(--line);margin-bottom:11px}
.acct-id .an{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acct-id .ae{font-size:12px;color:var(--ink-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acct-cards-h{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-faint);font-weight:800;margin-bottom:9px}
.acct-empty{font-size:12.5px;color:var(--ink-faint);padding:4px 0 8px}
.acct-card{display:flex;align-items:center;gap:9px;padding:7px 0}
.acct-card .ac-num{font-family:var(--mono);font-size:12.5px;font-weight:700}
.acct-card .ac-exp{font-family:var(--mono);font-size:11.5px;color:var(--ink-faint);margin-left:auto}
.acct-card .ac-rm{width:24px;height:24px;border-radius:7px;border:none;background:var(--surface-2);color:var(--ink-faint);display:grid;place-items:center}
.acct-card .ac-rm:hover{background:var(--rust);color:#fff}
.acct-signout{width:100%;margin-top:11px;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:9px;font-weight:700;font-size:13px;color:var(--ink)}
.acct-signout:hover{border-color:var(--rust);color:var(--rust)}

.drawer-scrim{position:fixed;inset:0;z-index:60;background:rgba(15,20,15,.5);backdrop-filter:blur(4px);display:flex;justify-content:flex-end;animation:fade .2s ease}
.cart-drawer{width:min(440px,96vw);height:100%;background:var(--paper);display:flex;flex-direction:column;box-shadow:var(--shadow-lg);animation:slidein .26s cubic-bezier(.2,.8,.2,1)}
.cart-head{display:flex;align-items:center;gap:11px;padding:20px 22px;border-bottom:1px solid var(--line)}
.cart-head h2{font-size:22px;font-weight:700;margin:0}
.cart-head .cart-count{font-size:12.5px;color:var(--ink-faint);font-weight:600}

.cart-head .cart-x:hover{background:var(--surface-3);color:var(--ink)}
.cart-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--ink-faint);gap:6px;padding:40px}
.cart-empty p{font-size:20px;color:var(--ink-soft);margin:8px 0 0}
.cart-empty span{font-size:13.5px}
.cart-items{flex:1;overflow-y:auto;padding:14px 16px}
.cart-item{display:flex;gap:11px;padding:14px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);margin-bottom:11px;box-shadow:var(--shadow)}
.cart-item .ci-dot{width:10px;height:10px;border-radius:99px;flex-shrink:0;margin-top:4px}
.cart-item .ci-main{flex:1;min-width:0}
.cart-item .ci-name{font-family:var(--serif);font-weight:600;font-size:15.5px;display:flex;align-items:center}
.cart-item .ci-sub{font-size:12px;color:var(--ink-soft);margin-top:2px}
.cart-item .ci-when{font-family:var(--mono);font-size:11.5px;color:var(--ink-faint);margin-top:3px}
.cart-item .ci-pax{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:11.5px;font-weight:700;color:var(--ink-soft)}
.cart-item .ci-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;flex-shrink:0}
.cart-item .ci-price{font-weight:700;color:var(--rust);font-size:16px}
.cart-item .ci-rm{background:none;border:none;color:var(--ink-faint);font-size:12px;font-weight:700;text-decoration:underline;padding:0}
.cart-item .ci-rm:hover{color:var(--rust)}
.cart-foot{border-top:1px solid var(--line);padding:16px 20px 20px;background:var(--surface)}
.cart-line{display:flex;justify-content:space-between;font-size:13.5px;color:var(--ink-soft);padding:4px 0}
.cart-line.total{border-top:1px solid var(--line);margin-top:6px;padding-top:11px;font-size:18px;font-weight:700;color:var(--ink)}
.cart-checkout{width:100%;margin-top:13px;background:var(--pine);color:#fff;border:none;border-radius:12px;padding:15px;font-weight:700;font-size:15.5px}
.cart-checkout:hover{background:var(--pine-deep)}
[data-theme="dark"] .cart-checkout{color:var(--snow)}
.cart-clear{width:100%;margin-top:9px;background:none;border:none;color:var(--ink-faint);font-weight:600;font-size:12.5px}
.cart-clear:hover{color:var(--rust)}

.wide-modal{width:min(560px,100%)}
.auth-modal{width:min(440px,100%);background:var(--paper);border-radius:var(--r-xl);box-shadow:var(--shadow-lg);overflow:hidden;position:relative;animation:popin .24s cubic-bezier(.2,.9,.3,1.1)}
.auth-tabs{display:flex;background:var(--surface-2);padding:5px;gap:4px;margin:18px 18px 0;border-radius:11px}
.auth-tabs button{flex:1;background:none;border:none;padding:10px;border-radius:8px;font-weight:700;font-size:13.5px;color:var(--ink-faint)}
.auth-tabs button.on{background:var(--surface);color:var(--pine);box-shadow:var(--shadow)}
.auth-body{padding:18px}
.auth-lead{font-size:17px;margin:0 0 16px;color:var(--ink-soft)}
.auth-alt{text-align:center;font-size:13px;color:var(--ink-faint);margin-top:13px}
.auth-alt button{background:none;border:none;color:var(--pine);font-weight:700;font-size:13px;text-decoration:underline}
.auth-demo{text-align:center;font-size:11.5px;color:var(--ink-faint);margin-top:11px}

.guest-row{font-size:12.5px;color:var(--ink-faint);margin-top:8px}
.guest-row button{background:none;border:none;color:var(--pine);font-weight:700;text-decoration:underline;padding:0;font-size:12.5px}
.pay-paying{font-size:13px;color:var(--ink-soft);background:var(--surface-2);border-radius:10px;padding:10px 13px;margin-bottom:14px}
.pay-paying b{color:var(--ink)}
.pay-paying .pp-link{background:none;border:none;color:var(--pine);font-weight:700;text-decoration:underline;margin-left:8px;font-size:13px}
.link-express{width:100%;background:#00d66f;color:#0a2e1a;border:none;border-radius:11px;padding:13px;font-weight:800;font-size:14.5px;display:flex;align-items:center;justify-content:center;gap:9px}
.link-express:hover{filter:brightness(1.04)}
.link-express .le-badge{background:#0a2e1a;color:#00d66f;font-size:11px;font-weight:800;padding:3px 8px;border-radius:6px;letter-spacing:.3px}
.pay-or{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--ink-faint);font-size:12px;font-weight:600}
.pay-or:before,.pay-or:after{content:"";flex:1;height:1px;background:var(--line)}
.saved-cards{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.saved-card{display:flex;align-items:center;gap:11px;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;background:var(--surface);font-weight:600;font-size:13.5px;color:var(--ink)}
.saved-card.on{border-color:var(--pine);background:color-mix(in oklab,var(--pine) 7%,var(--surface))}
.saved-card:hover{border-color:var(--pine)}
.saved-card .sc-radio{width:17px;height:17px;border-radius:99px;border:2px solid var(--line);flex-shrink:0;position:relative}
.saved-card.on .sc-radio{border-color:var(--pine)}
.saved-card.on .sc-radio:after{content:"";position:absolute;inset:3px;border-radius:99px;background:var(--pine)}
.saved-card .sc-num{font-family:var(--mono);font-weight:700}
.saved-card .sc-exp{font-family:var(--mono);font-size:12px;color:var(--ink-faint);margin-left:auto}
.saved-card .sc-plus{font-size:17px;color:var(--pine);font-weight:700}
.pay-card-wrap{margin-bottom:6px}
.pay-card{border:1.5px solid var(--line);border-radius:11px;overflow:hidden;background:var(--surface)}
.pay-card:focus-within{border-color:var(--pine);box-shadow:0 0 0 3px color-mix(in oklab,var(--pine) 18%,transparent)}
.pay-card .pc-row{display:flex;align-items:center}
.pay-card .pc-num{border-bottom:1.5px solid var(--line);padding-right:12px}
.pay-card .pc-num input{flex:1}
.pay-card .pc-split input{border-right:1.5px solid var(--line)}
.pay-card .pc-split input:last-child{border-right:none}
.pay-card input{border:none;background:none;outline:none;padding:13px 14px;font-size:14.5px;font-weight:600;color:var(--ink);font-family:var(--mono);width:100%;min-width:0}
.pay-card input::placeholder{color:var(--ink-faint);font-family:var(--ui);font-weight:500}
.pay-check{display:flex;align-items:center;gap:9px;margin-top:11px;font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer}
.pay-check input{width:17px;height:17px;accent-color:var(--pine)}
.pay-secure{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-faint);font-weight:600;margin-top:14px;justify-content:center}
.pay-secure b{color:var(--ink-soft)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;background:var(--pine-deep);color:#F3ECDC;padding:12px 18px;border-radius:12px;font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:9px;box-shadow:var(--shadow-lg);animation:toastin .25s cubic-bezier(.2,.9,.3,1.2)}
[data-theme="dark"] .toast{background:var(--surface-3);color:var(--ink)}
@keyframes toastin{from{opacity:0;transform:translate(-50%,14px)}to{opacity:1;transform:translate(-50%,0)}}

.bb-add{background:var(--surface-2);border:1.5px solid var(--line);color:var(--ink);border-radius:11px;padding:13px 20px;font-weight:700;font-size:14.5px;display:flex;align-items:center;gap:8px;margin-left:auto}
.bb-add:hover{border-color:var(--pine);color:var(--pine)}
.bookbar .bb-add + .bb-cta{margin-left:10px}
.bookbar .bb-cta{margin-left:0}

/* ---- preferences textarea + For-you bar ---- */
.prefs-area{resize:vertical;min-height:64px;line-height:1.45;font-family:var(--ui)}
.prefs-hint{font-size:11.5px;color:var(--ink-faint);margin-top:6px}

.fy-spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--pine);border-radius:99px;animation:spin .7s linear infinite;margin-right:9px;vertical-align:-2px}
.fy-tag{display:inline-flex;align-items:center;gap:6px;flex-shrink:0;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--rust)}
.fy-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:2px;flex:1}

.fy-card{display:flex;align-items:center;gap:9px;flex-shrink:0;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:7px 9px 7px 11px;cursor:pointer;max-width:340px}

.fy-main{min-width:0;display:flex;flex-direction:column;line-height:1.25}
.fy-main b{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fy-deal{font-size:11px;color:var(--ink-soft);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fy-x{flex-shrink:0;width:20px;height:20px;border:none;background:none;color:var(--ink-faint);border-radius:6px;display:grid;place-items:center}
.fy-x:hover{background:var(--surface-3);color:var(--rust)}
